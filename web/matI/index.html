<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Libro Digital — Matemáticas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" crossorigin="anonymous" onload="katexReady()"></script>
<style>
:root{
  --bg:#f7f7fc;--surface:#fff;--s2:#f0f0f8;--s3:#e6e6f4;
  --bd:#e0e0ee;--bd-l:#ebebf7;
  --t1:#0e0e1c;--t2:#32325a;--t3:#7070a0;--t4:#ababce;
  --a:#4f46e5;--a-m:#6366f1;--a-l:#eef2ff;--a-xl:#f5f7ff;--a-d:#3730a3;
  --gold:#b45309;--gold-l:#fffbeb;--gold-b:#fcd34d;
  --green:#15803d;--green-l:#f0fdf4;
  --red:#b91c1c;--red-l:#fff1f2;
  --violet:#7c3aed;--violet-l:#f5f3ff;
  --teal:#0d9488;--teal-l:#f0fdfa;
  --fd:'Lora',Georgia,serif;
  --fb:'Outfit',-apple-system,sans-serif;
  --fm:'JetBrains Mono','Courier New',monospace;
  --r:6px;--rl:12px;--rxl:20px;
  --sh:0 1px 3px rgba(79,70,229,.07),0 1px 2px rgba(0,0,0,.04);
  --shm:0 4px 18px rgba(79,70,229,.11),0 2px 4px rgba(0,0,0,.05);
  --shl:0 12px 40px rgba(79,70,229,.16);
  --sw:272px;--th:58px;--tr:.18s ease;
}
[data-theme="dark"]{
  --bg:#0b0b18;--surface:#13132a;--s2:#1a1a38;--s3:#222244;
  --bd:#2a2a58;--bd-l:#1e1e42;
  --t1:#f0f0ff;--t2:#c0c0e8;--t3:#6868a8;--t4:#404080;
  --a:#6366f1;--a-m:#818cf8;--a-l:#1a1a3f;--a-xl:#141428;--a-d:#4f46e5;
  --gold:#fbbf24;--gold-l:#1c1500;--gold-b:#78350f;
  --green:#4ade80;--green-l:#052e16;
  --red:#f87171;--red-l:#1c0404;
  --violet:#a78bfa;--violet-l:#1a0e30;
  --teal:#2dd4bf;--teal-l:#042f2e;
  --sh:0 1px 3px rgba(0,0,0,.4),0 1px 2px rgba(0,0,0,.3);
  --shm:0 4px 18px rgba(0,0,0,.5),0 2px 4px rgba(0,0,0,.3);
  --shl:0 12px 40px rgba(0,0,0,.6);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{font-family:var(--fb);background:var(--bg);color:var(--t1);line-height:1.6;min-height:100vh;overflow-x:hidden;transition:background .25s,color .25s}
a{color:var(--a-m);text-decoration:none}
button{cursor:pointer;border:none;background:none;font-family:var(--fb);color:inherit}

/* TOPBAR */
#topbar{
  position:fixed;top:0;left:0;right:0;height:var(--th);
  background:linear-gradient(135deg,var(--a-d),var(--a));
  display:flex;align-items:center;gap:12px;padding:0 16px;
  z-index:200;box-shadow:0 2px 14px rgba(79,70,229,.3);
}
.logo{display:flex;align-items:center;gap:9px;font-family:var(--fd);font-size:1rem;font-weight:700;color:#fff;cursor:pointer;white-space:nowrap;flex-shrink:0}
.logo-icon{width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:1.05rem;flex-shrink:0}
.subj-meta{border-left:1px solid rgba(255,255,255,.2);padding-left:12px;color:rgba(255,255,255,.65);font-size:.75rem;line-height:1.3;flex-shrink:0}
#sb-wrap{flex:1;max-width:460px;margin:0 auto;position:relative}
#sb-inp{width:100%;padding:7px 14px 7px 36px;border-radius:24px;border:1.5px solid rgba(255,255,255,.18);background:rgba(255,255,255,.1);color:#fff;font-family:var(--fb);font-size:.87rem;outline:none;transition:var(--tr)}
#sb-inp::placeholder{color:rgba(255,255,255,.45)}
#sb-inp:focus{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.38)}
.sb-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.6;pointer-events:none;font-size:.82rem}
.tbtn{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.75);font-size:1.05rem;transition:var(--tr);flex-shrink:0}
.tbtn:hover{background:rgba(255,255,255,.14);color:#fff}
#menu-btn{display:none}

/* SIDEBAR */
#sidebar{position:fixed;top:var(--th);left:0;bottom:0;width:var(--sw);background:var(--surface);border-right:1px solid var(--bd);overflow-y:auto;z-index:190;display:flex;flex-direction:column;transition:transform var(--tr)}
#sidebar::-webkit-scrollbar{width:3px}
#sidebar::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
.ss{padding:8px 10px 6px;border-bottom:1px solid var(--bd-l)}
.ss:last-child{border-bottom:none;flex:1}
.sl{font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t4);padding:6px 8px 4px}
.si{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:8px;color:var(--t2);font-size:.86rem;cursor:pointer;transition:var(--tr);width:100%;text-align:left;font-weight:500}
.si:hover{background:var(--a-xl);color:var(--a)}
.si.active{background:var(--a-l);color:var(--a);font-weight:600}
.si .ic{font-size:.85rem;opacity:.75;flex-shrink:0}
.si-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;margin-left:auto;box-shadow:0 0 6px var(--green)}

/* MAIN */
#main{margin-left:var(--sw);margin-top:var(--th);min-height:calc(100vh - var(--th));padding:32px 36px}
.vc-enter{animation:fadeUp .22s ease forwards}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* PAGE HEADER */
.ph{margin-bottom:24px}
.pt{font-family:var(--fd);font-size:1.9rem;font-weight:700;color:var(--t1);line-height:1.2;margin-bottom:4px}
.ps{color:var(--t3);font-size:.87rem}

/* BREADCRUMB */
.bc{display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--t3);margin-bottom:16px;flex-wrap:wrap}
.bci{cursor:pointer;transition:color var(--tr);padding:2px 0}
.bci:hover{color:var(--a-m)}
.bcs{opacity:.35;font-size:.8rem}
.bci.cur{color:var(--t2);font-weight:600;cursor:default}

/* STATS */
.srow{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:28px}
.scard{background:var(--surface);border:1px solid var(--bd);border-radius:var(--rl);padding:16px 18px;display:flex;flex-direction:column;gap:2px;box-shadow:var(--sh);position:relative;overflow:hidden}
.scard::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--a),var(--a-m));opacity:.6}
.sv{font-family:var(--fd);font-size:2rem;font-weight:700;color:var(--a);line-height:1;margin-bottom:2px}
.slb{font-size:.77rem;color:var(--t3);font-weight:500}

/* SECTION DIVIDER */
.sg{display:flex;align-items:center;gap:12px;margin:28px 0 14px}
.sg-t{font-size:.71rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t4);white-space:nowrap}
.sg-l{flex:1;height:1px;background:var(--bd)}

/* TABS */
.tabs{display:flex;gap:2px;background:var(--s2);border-radius:var(--rl);padding:4px;margin-bottom:24px;overflow-x:auto}
.tabs::-webkit-scrollbar{height:0}
.tb{padding:7px 14px;font-size:.84rem;font-weight:600;border-radius:9px;color:var(--t3);transition:var(--tr);white-space:nowrap;display:flex;align-items:center;gap:5px}
.tb:hover{color:var(--t1);background:rgba(255,255,255,.5)}
.tb.active{background:var(--surface);color:var(--a);box-shadow:var(--sh)}
.tc-n{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 4px;border-radius:9px;background:var(--a-l);color:var(--a);font-size:.68rem;font-weight:700}
.tb:not(.active) .tc-n{background:var(--s3);color:var(--t3)}

/* TOPIC GRID */
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(276px,1fr));gap:14px}
.tcard{background:var(--surface);border:1px solid var(--bd);border-radius:var(--rl);padding:20px;cursor:pointer;transition:all var(--tr);box-shadow:var(--sh);position:relative;overflow:hidden}
.tcard-bar{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--a),var(--a-m));transform:scaleX(0);transform-origin:left;transition:transform .3s ease}
.tcard:hover{box-shadow:var(--shm);transform:translateY(-3px);border-color:var(--a-l)}
.tcard:hover .tcard-bar{transform:scaleX(1)}
.tc-blk{font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--a);margin-bottom:6px}
.tc-ttl{font-family:var(--fd);font-size:1.02rem;font-weight:700;color:var(--t1);margin-bottom:8px;line-height:1.35}
.tc-dsc{font-size:.83rem;color:var(--t3);line-height:1.55;margin-bottom:12px}
.tc-ft{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.tc-done{position:absolute;top:14px;right:14px;width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)}

/* BADGES & KWS */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:.72rem;font-weight:600;line-height:1}
.bd-blue{background:var(--a-l);color:var(--a)}
.bd-gold{background:var(--gold-l);color:var(--gold);border:1px solid var(--gold-b)}
.bd-green{background:var(--green-l);color:var(--green)}
.bd-red{background:var(--red-l);color:var(--red)}
.bd-violet{background:var(--violet-l);color:var(--violet)}
.bd-teal{background:var(--teal-l);color:var(--teal)}
.bd-gray{background:var(--s2);color:var(--t3)}
.kw{display:inline-flex;align-items:center;padding:3px 8px;border-radius:5px;font-size:.73rem;background:var(--s2);color:var(--t3);border:1px solid var(--bd);cursor:pointer;transition:var(--tr);font-family:var(--fm)}
.kw:hover{background:var(--a-xl);color:var(--a);border-color:var(--a-l)}
.kws{display:flex;flex-wrap:wrap;gap:5px}

/* TOPIC SUMMARY */
.tsum{background:linear-gradient(135deg,var(--a-xl),var(--a-l));border:1px solid var(--a-l);border-radius:var(--rl);padding:18px 22px;margin-bottom:20px;position:relative;overflow:hidden}
.tsum::before{content:'';position:absolute;right:-20px;top:-20px;width:110px;height:110px;border-radius:50%;background:radial-gradient(circle,rgba(99,102,241,.12),transparent 70%)}
.tsum p{font-size:.92rem;color:var(--t2);line-height:1.75;position:relative}

/* CONNECTIONS */
.cpan{background:var(--surface);border:1px solid var(--bd);border-radius:var(--rl);padding:14px 18px;margin-bottom:14px}
.cpan-t{font-size:.67rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--t4);margin-bottom:9px}

/* INFO BOXES */
.ib{border-radius:var(--r);padding:12px 16px;margin:12px 0;font-size:.88rem;line-height:1.65}
.ib-def{background:var(--a-xl);border-left:3px solid var(--a);color:var(--t2)}
.ib-hint{background:var(--gold-l);border-left:3px solid var(--gold);color:var(--t2)}
.ib-warn{background:var(--red-l);border-left:3px solid var(--red);color:var(--t2)}
.ib-note{background:var(--green-l);border-left:3px solid var(--green);color:var(--t2)}
.ib-teal{background:var(--teal-l);border-left:3px solid var(--teal);color:var(--t2)}
.ib-t{font-weight:700;font-size:.73rem;letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px;opacity:.85}

/* THEORY ACCORDION */
.thsec{background:var(--surface);border:1px solid var(--bd);border-radius:var(--rl);margin-bottom:12px;overflow:hidden;box-shadow:var(--sh);transition:box-shadow var(--tr)}
.thsec:hover{box-shadow:var(--shm)}
.thhdr{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;transition:background var(--tr);border-bottom:1px solid transparent}
.thhdr:hover{background:var(--a-xl)}
.thhdr.open{border-bottom-color:var(--bd-l)}
.thn{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--a),var(--a-m));color:#fff;font-size:.75rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.th-ttl{font-family:var(--fd);font-size:.97rem;font-weight:600;color:var(--t1);flex:1;line-height:1.3}
.thchv{color:var(--t3);transition:transform .25s ease;font-size:.7rem}
.thhdr.open .thchv{transform:rotate(180deg)}
.thbdy{padding:18px 20px;display:none}
.thbdy.open{display:block;animation:fadeUp .2s ease}
.thbdy p{margin-bottom:12px;color:var(--t2);line-height:1.75;font-size:.9rem}
.thbdy p:last-child{margin-bottom:0}
.thbdy ul,.thbdy ol{margin:8px 0 12px 20px;color:var(--t2);font-size:.9rem;line-height:1.75}
.thbdy li{margin-bottom:4px}
.thbdy strong{color:var(--t1);font-weight:600}
.thbdy em{font-style:italic}
.mistakes{margin-top:14px;padding-top:14px;border-top:1px solid var(--bd-l)}
.mistakes-t{font-size:.73rem;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.mi{font-size:.85rem;color:var(--t2);padding:5px 0 5px 12px;border-left:2px solid var(--red);margin-bottom:6px;opacity:.85}

/* CONTENT CARDS */
.ccard{background:var(--surface);border:1px solid var(--bd);border-radius:var(--rl);margin-bottom:20px;overflow:hidden;box-shadow:var(--sh)}
.cc-hdr{padding:14px 18px;display:flex;align-items:flex-start;gap:12px;border-bottom:1px solid var(--bd-l)}
.cnb{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;flex-shrink:0}
.cnb.ej{background:linear-gradient(135deg,var(--gold-l),#fef3c7);color:var(--gold);border:1px solid var(--gold-b)}
.cnb.ex{background:linear-gradient(135deg,var(--violet-l),#ede9fe);color:var(--violet)}
.cta{flex:1;min-width:0}
.ct{font-family:var(--fd);font-size:.97rem;font-weight:600;color:var(--t1);line-height:1.3;margin-bottom:6px}
.cm{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.prob{padding:16px 18px;background:linear-gradient(135deg,var(--a-xl),var(--a-l));border-bottom:1px solid var(--a-l)}
.plb{font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--a);margin-bottom:8px;display:flex;align-items:center;gap:5px}
.prob p,.prob li{font-size:.91rem;color:var(--t2);line-height:1.75}
.steps{padding:0 18px 18px}
.steps-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 0 12px;border-bottom:1px solid var(--bd-l);margin-bottom:14px;flex-wrap:wrap;gap:8px}
.slbl{font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t4)}
.step-btns{display:flex;gap:7px;flex-wrap:wrap}
.rbtn{font-size:.77rem;color:var(--a);font-weight:600;padding:5px 12px;border-radius:20px;border:1.5px solid var(--a-l);transition:var(--tr);background:var(--a-xl)}
.rbtn:hover{background:var(--a-l);border-color:var(--a)}
.step{display:flex;gap:13px;margin-bottom:14px;animation:fadeUp .2s ease}
.step.hidden{display:none}
.snum{width:26px;height:26px;border-radius:50%;background:var(--s2);border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;color:var(--t3);flex-shrink:0;margin-top:2px}
.scon{flex:1;min-width:0}
.sexp{font-size:.89rem;color:var(--t2);line-height:1.7;margin-bottom:7px}
.sexp p{margin-bottom:5px}
.smath{padding:10px 14px;background:var(--s2);border-radius:var(--r);overflow-x:auto;font-size:.9rem;border:1px solid var(--bd)}
.ans{margin:0 18px 18px;padding:14px 16px;background:var(--green-l);border:1px solid rgba(21,128,61,.2);border-radius:var(--r)}
.alb{font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--green);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.ans p{font-size:.91rem;color:var(--t2);line-height:1.65}

/* FLASHCARDS */
.fc-wrap{max-width:600px;margin:0 auto}
.fc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px}
.fc-prog-bar{flex:1;height:4px;background:var(--s3);border-radius:2px;overflow:hidden}
.fc-prog-fill{height:100%;background:linear-gradient(90deg,var(--a),var(--a-m));border-radius:2px;transition:width .4s ease}
.fc-prog-txt{font-size:.8rem;font-weight:600;color:var(--t3);white-space:nowrap}
.fc-scene{perspective:1400px;height:240px;cursor:pointer;margin-bottom:16px;user-select:none}
.fc-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.2,1)}
.fc-inner.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;border-radius:var(--rxl);display:flex;align-items:center;justify-content:center;padding:28px;backface-visibility:hidden;box-shadow:var(--shm)}
.fc-front{background:linear-gradient(145deg,var(--a-d),var(--a),var(--a-m));color:#fff}
.fc-back{background:var(--surface);border:2px solid var(--a-l);color:var(--t1);transform:rotateY(180deg)}
.fc-con{text-align:center;font-size:1rem;line-height:1.65}
.fc-front .fc-con{color:rgba(255,255,255,.92)}
.fc-hint{font-size:.74rem;opacity:.5;margin-top:12px}
.fc-ctrl{display:flex;justify-content:center;align-items:center;gap:12px}
.fc-nav{width:40px;height:40px;border-radius:50%;background:var(--surface);border:1.5px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:.9rem;transition:var(--tr);color:var(--t2)}
.fc-nav:hover:not(:disabled){background:var(--a-xl);border-color:var(--a);color:var(--a)}
.fc-nav:disabled{opacity:.3;cursor:default}
.fc-flip-btn{padding:9px 28px;border-radius:24px;background:var(--a);color:#fff;font-size:.88rem;font-weight:600;transition:var(--tr)}
.fc-flip-btn:hover{background:var(--a-m);box-shadow:0 4px 14px rgba(79,70,229,.35)}
.fc-keys{text-align:center;font-size:.74rem;color:var(--t4);margin-top:12px}
kbd{display:inline-flex;align-items:center;justify-content:center;padding:1px 6px;border-radius:4px;background:var(--s2);border:1px solid var(--bd);font-family:var(--fm);font-size:.73rem;font-weight:600;color:var(--t3)}

/* QUIZ */
.qz-wrap{max-width:640px}
.qz-top{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.qz-bar-wrap{flex:1;height:5px;background:var(--s3);border-radius:3px;overflow:hidden}
.qz-fill{height:100%;background:linear-gradient(90deg,var(--a),var(--a-m));border-radius:3px;transition:width .4s ease}
.qz-counter{font-size:.8rem;font-weight:600;color:var(--t3);white-space:nowrap}
.qz-q{font-family:var(--fd);font-size:1.05rem;font-weight:600;color:var(--t1);margin-bottom:20px;line-height:1.5}
.qz-opts{display:flex;flex-direction:column;gap:9px;margin-bottom:20px}
.qz-opt{padding:13px 16px;border-radius:var(--rl);border:2px solid var(--bd);background:var(--surface);text-align:left;font-size:.9rem;color:var(--t2);transition:all var(--tr);cursor:pointer;display:flex;align-items:center;gap:12px}
.qz-lt{width:26px;height:26px;border-radius:50%;background:var(--s2);border:1.5px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:.74rem;font-weight:700;color:var(--t3);flex-shrink:0;transition:var(--tr)}
.qz-opt:hover:not([disabled]){border-color:var(--a);background:var(--a-xl)}
.qz-opt:hover:not([disabled]) .qz-lt{background:var(--a);border-color:var(--a);color:#fff}
.qz-opt.correct{border-color:var(--green);background:var(--green-l)}
.qz-opt.correct .qz-lt{background:var(--green);border-color:var(--green);color:#fff}
.qz-opt.wrong{border-color:var(--red);background:var(--red-l)}
.qz-opt.wrong .qz-lt{background:var(--red);border-color:var(--red);color:#fff}
.qz-fb{padding:13px 16px;border-radius:var(--r);font-size:.88rem;line-height:1.65;margin-bottom:16px;animation:fadeUp .2s ease}
.qz-fb.correct{background:var(--green-l);border-left:3px solid var(--green)}
.qz-fb.wrong{background:var(--red-l);border-left:3px solid var(--red)}
.btn-primary{display:inline-flex;align-items:center;gap:7px;padding:10px 24px;background:linear-gradient(135deg,var(--a),var(--a-m));color:#fff;border-radius:24px;font-weight:600;font-size:.88rem;transition:var(--tr);box-shadow:0 2px 8px rgba(79,70,229,.25)}
.btn-primary:hover{box-shadow:0 4px 16px rgba(79,70,229,.35);transform:translateY(-1px)}
.btn-sec{display:inline-flex;align-items:center;gap:7px;padding:10px 22px;background:var(--surface);color:var(--a);border:2px solid var(--a-l);border-radius:24px;font-weight:600;font-size:.88rem;transition:var(--tr)}
.btn-sec:hover{background:var(--a-xl);border-color:var(--a)}
.qz-res{text-align:center;padding:32px 0}
.qz-sc{font-family:var(--fd);font-size:3.5rem;font-weight:700;line-height:1;margin-bottom:4px}
.qz-sc.ok{color:var(--green)}.qz-sc.mid{color:var(--gold)}.qz-sc.low{color:var(--red)}
.qz-scl{color:var(--t3);font-size:.88rem;margin-bottom:6px}
.qz-msg{color:var(--t2);font-size:.92rem;margin-bottom:24px}

/* TASKS */
.task-card{background:var(--surface);border:1px solid var(--bd);border-radius:var(--rl);padding:20px;margin-bottom:14px;box-shadow:var(--sh);transition:var(--tr)}
.task-card:hover{box-shadow:var(--shm)}
.task-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.task-ico{width:36px;height:36px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.1rem}
.task-ico.due-soon{background:var(--red-l)}.task-ico.pending{background:var(--gold-l)}.task-ico.done{background:var(--green-l)}
.task-meta{flex:1;min-width:0}
.task-title{font-family:var(--fd);font-size:.97rem;font-weight:600;color:var(--t1);margin-bottom:4px}
.task-info{font-size:.8rem;color:var(--t3);display:flex;gap:10px;flex-wrap:wrap}
.task-desc{font-size:.88rem;color:var(--t2);line-height:1.7;margin-bottom:12px;padding-top:10px;border-top:1px solid var(--bd-l)}
.task-footer{display:flex;align-items:center;gap:8px;flex-wrap:wrap}

/* SEARCH */
.sinput{width:100%;padding:12px 16px 12px 44px;border:2px solid var(--bd);border-radius:var(--rl);font-size:.95rem;font-family:var(--fb);outline:none;transition:border-color var(--tr);background:var(--surface);color:var(--t1)}
.sinput:focus{border-color:var(--a)}
.sr{background:var(--surface);border:1px solid var(--bd);border-radius:var(--rl);padding:14px 18px;margin-bottom:9px;cursor:pointer;transition:var(--tr);box-shadow:var(--sh)}
.sr:hover{border-color:var(--a-l);box-shadow:var(--shm);transform:translateX(2px)}
.sr-tp{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t4);margin-bottom:3px}
.sr-tt{font-weight:600;color:var(--t1);margin-bottom:3px;font-size:.92rem}
.sr-ex{font-size:.83rem;color:var(--t3);line-height:1.5}
mark.hl{background:var(--gold-l);color:var(--gold);padding:0 2px;border-radius:2px}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.filt{padding:5px 13px;border-radius:20px;font-size:.8rem;font-weight:600;border:1.5px solid var(--bd);background:var(--surface);color:var(--t3);transition:var(--tr);cursor:pointer}
.filt.active,.filt:hover{background:var(--a-l);border-color:var(--a);color:var(--a)}

/* SABERES */
.sb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
.sbcard{background:var(--surface);border:1px solid var(--bd);border-radius:var(--rl);padding:16px;cursor:pointer;transition:var(--tr);box-shadow:var(--sh)}
.sbcard:hover{border-color:var(--a);background:var(--a-xl);box-shadow:var(--shm)}
.sb-id{font-size:.72rem;font-family:var(--fm);font-weight:600;color:var(--a);margin-bottom:6px;display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;background:var(--a-l)}
.sb-desc{font-size:.87rem;color:var(--t2);line-height:1.55;font-weight:500}
.sb-tpcs{font-size:.76rem;color:var(--t3);margin-top:8px;line-height:1.5}

/* PROGRESS */
.prog-wrap{display:flex;align-items:center;gap:10px;margin-bottom:20px;padding:12px 16px;background:var(--s2);border-radius:var(--r)}
.prog-bar{flex:1;height:5px;background:var(--bd);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--a),var(--green));border-radius:3px;transition:width .6s ease}
.prog-lbl{font-size:.78rem;font-weight:600;color:var(--t3);white-space:nowrap}
.prog-btn{font-size:.78rem;font-weight:600;color:var(--a);padding:4px 10px;border-radius:12px;border:1.5px solid var(--a-l);background:var(--a-xl);transition:var(--tr)}
.prog-btn:hover{background:var(--a-l)}

/* EMPTY / LOADING */
.empty{text-align:center;padding:56px 20px;color:var(--t3)}
.empty-ico{font-size:3rem;margin-bottom:16px;opacity:.3}
.empty-t{font-family:var(--fd);font-size:1.1rem;color:var(--t2);margin-bottom:6px}
.empty-s{font-size:.85rem;color:var(--t3)}
.loading{display:flex;flex-direction:column;align-items:center;padding:56px 20px;gap:14px;color:var(--t3)}
.spin{width:36px;height:36px;border:3px solid var(--bd);border-top-color:var(--a);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--t1);color:var(--bg);padding:10px 22px;border-radius:24px;font-size:.85rem;font-weight:600;z-index:300;opacity:0;transition:.3s ease;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.25)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* MOBILE */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:185;backdrop-filter:blur(3px)}
#overlay.vis{display:block}
#bnav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--bd);padding:6px 8px calc(6px + env(safe-area-inset-bottom));z-index:195;box-shadow:0 -2px 16px rgba(0,0,0,.08)}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px;border-radius:8px;color:var(--t3);font-size:.62rem;font-weight:600;transition:var(--tr);cursor:pointer}
.bn:hover,.bn.active{color:var(--a)}
.bn.active .bi-bg{background:var(--a-l)}
.bi-bg{width:32px;height:22px;border-radius:10px;display:flex;align-items:center;justify-content:center;transition:var(--tr)}
.bi{font-size:1.15rem}

/* KATEX */
.katex{font-size:1em!important}
.katex-display{overflow-x:auto;overflow-y:hidden;padding:4px 0;margin:4px 0}

/* RESPONSIVE */
@media(max-width:900px){
  :root{--sw:100vw}
  #sidebar{transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0);box-shadow:var(--shl)}
  #menu-btn{display:flex}
  #main{margin-left:0;padding:20px 16px 90px}
  .tgrid{grid-template-columns:1fr}
  .srow{grid-template-columns:repeat(2,1fr)}
  #bnav{display:flex}
  .subj-meta{display:none}
  #sb-wrap{max-width:none}
}
@media(max-width:480px){.pt{font-size:1.5rem}.fc-scene{height:210px}.fc-con{font-size:.93rem}}
@media print{#topbar,#sidebar,#bnav,#overlay,#toast,#menu-btn{display:none!important}#main{margin:0;padding:14px;max-width:none}.thbdy{display:block!important}.tcard,.ccard{break-inside:avoid}}
</style>
</head>
<body>
<header id="topbar">
  <div class="logo" onclick="nav('#/')"><div class="logo-icon">∑</div><span id="logo-t">Matemáticas</span></div>
  <div class="subj-meta" id="subj-inf"><div id="subj-c" style="font-weight:600">1.º Bachillerato</div><div id="subj-g" style="font-size:.72rem;opacity:.75"></div></div>
  <div id="sb-wrap"><span class="sb-ico">🔍</span><input type="text" id="sb-inp" placeholder="Buscar conceptos, ejercicios…" autocomplete="off" spellcheck="false"></div>
  <button class="tbtn" onclick="toggleDark()" id="theme-btn" title="Cambiar tema">🌙</button>
  <button class="tbtn" id="menu-btn" onclick="toggleSb()" aria-label="Menú">☰</button>
</header>
<nav id="sidebar">
  <div class="ss">
    <div class="sl">Navegación</div>
    <button class="si" onclick="nav('#/');closeSb()"><span class="ic">🏠</span>Inicio</button>
    <button class="si" onclick="nav('#/temas');closeSb()"><span class="ic">📚</span>Todos los temas</button>
    <button class="si" onclick="nav('#/tareas');closeSb()"><span class="ic">📋</span>Tareas</button>
    <button class="si" onclick="nav('#/saberes');closeSb()"><span class="ic">🎯</span>Saberes básicos</button>
    <button class="si" onclick="nav('#/buscar');closeSb()"><span class="ic">🔍</span>Buscador</button>
  </div>
  <div class="ss" id="sb-blocks"></div>
  <div class="ss"><div class="sl">Temas</div><div id="sb-topics"></div></div>
</nav>
<main id="main">
  <div class="loading" id="app-load"><div class="spin"></div><span>Cargando…</span></div>
  <div id="vc" style="display:none"></div>
</main>
<nav id="bnav" style="display:none">
  <button class="bn active" onclick="nav('#/')"><div class="bi-bg"><span class="bi">🏠</span></div>Inicio</button>
  <button class="bn" onclick="nav('#/temas')"><div class="bi-bg"><span class="bi">📚</span></div>Temas</button>
  <button class="bn" onclick="nav('#/tareas')"><div class="bi-bg"><span class="bi">📋</span></div>Tareas</button>
  <button class="bn" onclick="nav('#/buscar')"><div class="bi-bg"><span class="bi">🔍</span></div>Buscar</button>
  <button class="bn" onclick="nav('#/saberes')"><div class="bi-bg"><span class="bi">🎯</span></div>Saberes</button>
</nav>
<div id="overlay" onclick="closeSb()"></div>
<div id="toast"></div>
<script>
/* KATEX */
let _kx=false,_kq=null,_mt=null;
function katexReady(){_kx=true;if(_kq){_doMath(_kq);_kq=null;}}
function renderMath(el){
  if(!el)return;
  if(!_kx){_kq=el;return;}
  if(_mt)clearTimeout(_mt);
  _mt=setTimeout(()=>{
    try{renderMathInElement(el,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false},{left:'\\(',right:'\\)',display:false},{left:'\\[',right:'\\]',display:true}],throwOnError:false,errorColor:'#b91c1c',strict:false});}
    catch(e){console.warn('KaTeX:',e);}
  },120);
}
function _doMath(el){renderMath(el);}

/* DARK MODE */
function toggleDark(){
  const dark=document.documentElement.getAttribute('data-theme')==='dark';
  const next=dark?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  document.getElementById('theme-btn').textContent=next==='dark'?'☀️':'🌙';
  try{localStorage.setItem('mat-theme',next);}catch{}
}
(()=>{try{const t=localStorage.getItem('mat-theme')||'light';document.documentElement.setAttribute('data-theme',t);const b=document.getElementById('theme-btn');if(b)b.textContent=t==='dark'?'☀️':'🌙';}catch{}})();

/* PROGRESS */
function getProg(){try{return JSON.parse(localStorage.getItem('mat-prog')||'{}')}catch{return {}}}
function topicDone(id){return !!getProg()[id]}
function toggleDone(id){
  const done=!topicDone(id);
  try{const p=getProg();p[id]=done;localStorage.setItem('mat-prog',JSON.stringify(p));}catch{}
  toast(done?'✓ Tema marcado como estudiado':'Tema desmarcado');
  const el=document.querySelector(`[data-prog="${id}"]`);if(el)el.style.display=done?'block':'none';
  const btn=document.getElementById('prog-btn');
  if(btn){btn.textContent=done?'✓ Estudiado':'Marcar como estudiado';btn.style.color=done?'var(--green)':'';btn.style.background=done?'var(--green-l)':'';}
}

/* TOAST */
let _tt=null;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');if(_tt)clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2400);}

/* STATE */
const S={cfg:null,topics:[],cache:{},idx:[],tab:'teoria',tid:null,fci:0,fcd:[],fcf:false,qi:[],qidx:0,qans:false,qsc:0,revealed:{},srFilter:'all'};

/* DEFAULT CFG */
const DEF_CFG={subject:'Matemáticas I',course:'1.º Bachillerato',group:'',year:'2024-2025',teacher:'',data_base_url:'.',
  blocks:[{id:'algebra',title:'Álgebra y análisis',icon:'∫'},{id:'geometria',title:'Geometría',icon:'△'},{id:'estadistica',title:'Estadística y probabilidad',icon:'◻'}],
  saberes_basicos:[{id:'SB1',desc:'Sentido numérico y algebraico'},{id:'SB2',desc:'Sentido espacial y geométrico'},{id:'SB3',desc:'Sentido estocástico'},{id:'SB4',desc:'Sentido funcional y analítico'}]
};

/* DATA */
function base(){return S.cfg?.data_base_url||'.';}
async function loadCfg(){try{const r=await fetch('./config.json');if(!r.ok)throw 0;return await r.json();}catch{return DEF_CFG;}}
async function loadTopics(){try{const r=await fetch(`${base()}/data/topics.json`);if(!r.ok)throw 0;return await r.json();}catch{return SAMPLE_TOPICS;}}
async function loadTopic(id){
  if(S.cache[id])return S.cache[id];
  try{const r=await fetch(`${base()}/data/tema_${id}.json`);if(!r.ok)throw 0;const d=await r.json();S.cache[id]=d;idxTopic(d);return d;}
  catch{if(SAMPLE_DATA[id]){S.cache[id]=SAMPLE_DATA[id];idxTopic(SAMPLE_DATA[id]);return SAMPLE_DATA[id];}return null;}
}
function idxTopic(d){
  const ti=d.topic?.id||'',tt=d.topic?.title||'';
  (d.theory_sections||[]).forEach(x=>addIdx({type:'teoria',tid:ti,ttl:tt,id:x.id,title:x.title,exc:strip(x.content_html||'').slice(0,150),kw:x.keywords||[]}));
  (d.worked_examples||[]).forEach(x=>addIdx({type:'ejemplo',tid:ti,ttl:tt,id:x.id,title:x.title,exc:strip(x.problem_html||'').slice(0,150),kw:x.keywords||[],diff:x.difficulty}));
  (d.solved_exercises||[]).forEach(x=>addIdx({type:'ejercicio',tid:ti,ttl:tt,id:x.id,title:x.title,exc:strip(x.problem_html||'').slice(0,150),kw:x.keywords||[],diff:x.difficulty}));
}
function addIdx(item){if(!S.idx.find(x=>x.id===item.id))S.idx.push(item);}
function strip(h){return h.replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim();}

/* ROUTER */
function nav(hash){window.location.hash=hash;}
window.addEventListener('hashchange',route);
async function route(){
  const hash=window.location.hash||'#/';const path=hash.slice(1);const parts=path.split('/').filter(Boolean);
  show(`<div class="loading"><div class="spin"></div></div>`);
  updBnav(parts[0]||'');updSbActive();
  try{
    if(!parts.length||parts[0]==='')await rHome();
    else if(parts[0]==='temas')rList();
    else if(parts[0]==='tema'&&parts[1]){S.tid=parts[1];S.tab=parts[2]||'teoria';await rTopic(parts[1],S.tab);}
    else if(parts[0]==='buscar'){const q=decodeURIComponent((path.split('?')[1]||'').replace('q=',''));rSearch(q);}
    else if(parts[0]==='saberes')rSaberes();
    else if(parts[0]==='tareas')rTareas();
    else await rHome();
  }catch(e){console.error(e);show(`<div class="empty"><div class="empty-ico">⚠️</div><div class="empty-t">Error cargando la vista</div></div>`);}
}
function updBnav(v){const map=['','temas','tareas','buscar','saberes'];document.querySelectorAll('.bn').forEach((b,i)=>b.classList.toggle('active',v===map[i]));}
function updSbActive(){const h=window.location.hash;document.querySelectorAll('.si[data-id]').forEach(el=>el.classList.toggle('active',h.includes(el.dataset.id)));}

/* SIDEBAR */
function toggleSb(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('vis');}
function closeSb(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('vis');}
function buildSb(){
  const c=S.cfg;
  document.getElementById('logo-t').textContent=c.subject;
  document.getElementById('subj-c').textContent=c.course;
  document.getElementById('subj-g').textContent=[c.group,c.year].filter(Boolean).join(' · ');
  document.title=`${c.subject} — ${c.course}`;
  if(c.blocks?.length)document.getElementById('sb-blocks').innerHTML=`<div class="sl">Bloques</div>`+c.blocks.map(b=>`<button class="si" onclick="nav('#/temas');closeSb()"><span class="ic">${b.icon||'📁'}</span>${b.title}</button>`).join('');
  const prog=getProg();
  document.getElementById('sb-topics').innerHTML=S.topics.map(t=>`<button class="si" data-id="${t.id}" onclick="nav('#/tema/${t.id}');closeSb()"><span class="ic">${t.icon||'📄'}</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.title}</span>${prog[t.id]?'<span class="si-dot"></span>':''}</button>`).join('');
}

/* HOME */
async function rHome(){
  const c=S.cfg,t=S.topics,prog=getProg();
  const done=t.filter(x=>prog[x.id]).length;
  const pct=t.length?Math.round(done/t.length*100):0;
  const stats=`<div class="srow"><div class="scard"><div class="sv">${t.length}</div><div class="slb">Temas del curso</div></div><div class="scard"><div class="sv">${done}</div><div class="slb">Temas estudiados</div></div><div class="scard"><div class="sv">${S.idx.filter(x=>x.type==='teoria').length||'—'}</div><div class="slb">Secciones teóricas</div></div><div class="scard"><div class="sv">${S.idx.filter(x=>x.type==='ejercicio').length||'—'}</div><div class="slb">Ejercicios resueltos</div></div></div>`;
  const progress=t.length?`<div class="prog-wrap"><span class="prog-lbl" style="font-weight:700;color:var(--t2)">Progreso global</span><div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div><span class="prog-lbl">${pct}%</span></div>`:'';
  const cards=t.map(tp=>`<div class="tcard" onclick="nav('#/tema/${tp.id}')"><div class="tcard-bar"></div><div class="tc-done" data-prog="${tp.id}" style="${prog[tp.id]?'':'display:none'}"></div><div class="tc-blk">${tp.block||''}</div><div class="tc-ttl">${tp.title}</div><div class="tc-dsc">${tp.description||''}</div><div class="tc-ft">${(tp.keywords||[]).slice(0,3).map(k=>`<span class="kw">${k}</span>`).join('')}</div></div>`).join('');
  show(`<div class="ph"><div class="pt">${c.subject}</div><div class="ps">${c.course}${c.group?' · '+c.group:''}${c.teacher?' · Prof. '+c.teacher:''}</div></div>${progress}${stats}<div class="sg"><span class="sg-t">Temas del curso</span><div class="sg-l"></div></div><div class="tgrid">${cards||empt('Carga topics.json para mostrar los temas')}</div>`);
}

/* TOPIC LIST */
function rList(){
  const by={};S.topics.forEach(t=>{const b=t.block||'Sin bloque';if(!by[b])by[b]=[];by[b].push(t);});
  const prog=getProg();
  let h=`<div class="ph"><div class="pt">Todos los temas</div><div class="ps">${S.topics.length} temas disponibles</div></div>`;
  Object.entries(by).forEach(([blk,tps])=>{
    h+=`<div class="sg"><span class="sg-t">${blk}</span><div class="sg-l"></div></div><div class="tgrid">${tps.map(t=>`<div class="tcard" onclick="nav('#/tema/${t.id}')"><div class="tcard-bar"></div><div class="tc-done" data-prog="${t.id}" style="${prog[t.id]?'':'display:none'}"></div><div class="tc-blk">${t.block||''}</div><div class="tc-ttl">${t.title}</div><div class="tc-dsc">${t.description||''}</div><div class="tc-ft">${(t.keywords||[]).slice(0,3).map(k=>`<span class="kw">${k}</span>`).join('')}</div></div>`).join('')}</div>`;
  });
  show(h);
}

/* TOPIC DETAIL */
async function rTopic(id,tab){
  const d=await loadTopic(id);
  if(!d){show(`<div class="empty"><div class="empty-ico">⚠️</div><div class="empty-t">Tema no encontrado: "${id}"</div><div class="empty-s">Comprueba que existe <code>data/tema_${id}.json</code></div></div>`);return;}
  const tp=d.topic||{};
  const thy=d.theory_sections||[],exs=d.worked_examples||[],sol=d.solved_exercises||[],fcs=d.flashcards||[],qz=d.quiz||[],tasks=d.tasks||[];
  const tabs=[{id:'teoria',lbl:'Teoría',n:thy.length,ico:'📖'},{id:'ejemplos',lbl:'Ejemplos',n:exs.length,ico:'✏️'},{id:'ejercicios',lbl:'Ejercicios',n:sol.length,ico:'🔧'},{id:'flashcards',lbl:'Flashcards',n:fcs.length,ico:'🃏'},{id:'test',lbl:'Test',n:qz.length,ico:'✅'},{id:'tareas',lbl:'Tareas',n:tasks.length,ico:'📋'}].filter(t=>t.n>0);
  const done=topicDone(id);
  const bc=`<div class="bc"><span class="bci" onclick="nav('#/')">Inicio</span><span class="bcs">›</span><span class="bci" onclick="nav('#/temas')">Temas</span><span class="bcs">›</span><span class="bci cur">${tp.title||id}</span></div>`;
  const progBar=`<div class="prog-wrap"><button class="prog-btn" id="prog-btn" onclick="toggleDone('${id}')" style="${done?'color:var(--green);background:var(--green-l)':''}">${done?'✓ Estudiado':'Marcar como estudiado'}</button><div class="prog-bar" style="margin-left:10px"><div class="prog-fill" style="width:${done?100:0}%"></div></div></div>`;
  const sum=tp.summary?`<div class="tsum"><p>${tp.summary}</p></div>`:'';
  const meta=`${tp.keywords?.length?`<div class="cpan"><div class="cpan-t">Palabras clave</div><div class="kws">${tp.keywords.map(k=>`<span class="kw" onclick="searchKw('${k}')">${k}</span>`).join('')}</div></div>`:''}${tp.saberes_basicos?.length?`<div class="cpan" style="margin-bottom:20px"><div class="cpan-t">Saberes básicos</div><div class="kws">${tp.saberes_basicos.map(s=>`<span class="badge bd-blue">${s}</span>`).join('')}</div></div>`:''}`;
  const tabHtml=`<div class="tabs">${tabs.map(t=>`<button class="tb ${tab===t.id?'active':''}" onclick="swTab('${id}','${t.id}')">${t.ico} ${t.lbl}<span class="tc-n">${t.n}</span></button>`).join('')}</div>`;
  let tc='';
  if(tab==='teoria')tc=rTeoria(thy);
  else if(tab==='ejemplos')tc=rItems(exs,'ej');
  else if(tab==='ejercicios')tc=rItems(sol,'ex');
  else if(tab==='flashcards'){S.fcd=fcs;S.fci=0;S.fcf=false;tc=rFC();}
  else if(tab==='test'){S.qi=qz;S.qidx=0;S.qans=false;S.qsc=0;tc=rQQ();}
  else if(tab==='tareas')tc=rTaskList(tasks);
  show(`${bc}<div class="ph"><div class="pt">${tp.title||id}</div><div class="ps">${tp.block||''}${tp.course?' · '+tp.course:''}</div></div>${progBar}${sum}${meta}${tabHtml}<div id="tc">${tc}</div>`);
}
function swTab(tid,tab){S.tab=tab;nav(`#/tema/${tid}/${tab}`);}

/* TEORIA */
function rTeoria(secs){
  if(!secs.length)return empt('No hay secciones teóricas para este tema.');
  return secs.map((s,i)=>{
    const mk=s.common_mistakes?.length?`<div class="mistakes"><div class="mistakes-t">⚠️ Errores frecuentes</div>${s.common_mistakes.map(m=>`<div class="mi">${m}</div>`).join('')}</div>`:'';
    const kw=s.keywords?.length?`<div style="margin-top:13px;padding-top:12px;border-top:1px solid var(--bd-l)"><div class="cpan-t">Palabras clave de esta sección</div><div class="kws">${s.keywords.map(k=>`<span class="kw" onclick="searchKw('${k}')">${k}</span>`).join('')}</div></div>`:'';
    return `<div class="thsec"><div class="thhdr open" id="h${s.id}" onclick="togTh('${s.id}')"><div class="thn">${i+1}</div><div class="th-ttl">${s.title}</div><span class="thchv">▼</span></div><div class="thbdy open" id="b${s.id}"><div>${s.content_html||''}</div>${mk}${kw}</div></div>`;
  }).join('');
}
function togTh(id){document.getElementById('h'+id)?.classList.toggle('open');const b=document.getElementById('b'+id);if(b){b.classList.toggle('open');if(b.classList.contains('open'))renderMath(b);}}

/* CONTENT CARDS */
function rItems(items,type){if(!items.length)return empt(`No hay ${type==='ej'?'ejemplos':'ejercicios'} para este tema.`);return items.map((it,i)=>rCard(it,i+1,type)).join('');}
function rCard(item,num,type){
  const db={basica:['bd-green','Básica'],media:['bd-gold','Media'],alta:['bd-red','Alta']}[item.difficulty]||['bd-gray','—'];
  const sc=item.solution_steps?.length||0;const cid=item.id||`${type}${num}`;
  if(!(cid in S.revealed))S.revealed[cid]=sc;
  const steps=(item.solution_steps||[]).map((st,si)=>{const sn=si+1,hid=sn>S.revealed[cid];const math=st.latex?`<div class="smath">$$${st.latex}$$</div>`:'';return `<div class="step ${hid?'hidden':''}" id="s${cid}-${sn}"><div class="snum">${sn}</div><div class="scon"><div class="sexp">${st.explanation_html||''}</div>${math}</div></div>`;}).join('');
  const ctrl=sc>0?`<div class="step-btns"><button class="rbtn" onclick="hideSteps('${cid}',${sc})">↺ Reiniciar</button><button class="rbtn" onclick="showAll('${cid}',${sc})">Ver todo</button><button class="rbtn" onclick="nextStep('${cid}',${sc})" id="ns-${cid}">Siguiente ›</button></div>`:'';
  const strat=item.strategy_html?`<div class="ib ib-hint" style="margin-top:10px"><div class="ib-t">💡 Estrategia</div><div>${item.strategy_html}</div></div>`:'';
  const appr=item.approach_html?`<div class="ib ib-teal" style="margin-top:10px"><div class="ib-t">🧭 Enfoque</div><div>${item.approach_html}</div></div>`:'';
  const ans=item.final_answer_html?`<div class="ans"><div class="alb">✓ Respuesta final</div><div>${item.final_answer_html}</div></div>`:'';
  const mk=item.common_mistake_html?`<div style="padding:0 18px 14px"><div class="ib ib-warn"><div class="ib-t">⚠️ Error frecuente</div>${item.common_mistake_html}</div></div>`:'';
  const chk=item.check_html?`<div style="padding:0 18px 12px"><div class="ib ib-note"><div class="ib-t">✓ Comprobación</div>${item.check_html}</div></div>`:'';
  const kw=item.keywords?.length?`<div style="padding:10px 18px 14px;border-top:1px solid var(--bd-l)"><div class="kws">${item.keywords.map(k=>`<span class="kw" onclick="searchKw('${k}')">${k}</span>`).join('')}</div></div>`:'';
  return `<div class="ccard"><div class="cc-hdr"><div class="cnb ${type}">${num}</div><div class="cta"><div class="ct">${item.title}</div><div class="cm"><span class="badge ${db[0]}">${db[1]}</span><span class="badge bd-gray">${sc} pasos</span>${(item.saberes_basicos||[]).slice(0,2).map(s=>`<span class="badge bd-blue">${s}</span>`).join('')}</div></div></div><div class="prob"><div class="plb">📝 Enunciado</div><div>${item.problem_html||''}</div>${strat}${appr}</div><div class="steps"><div class="steps-hdr"><span class="slbl">Resolución paso a paso</span>${ctrl}</div>${steps}</div>${mk}${chk}${ans}${kw}</div>`;
}
function hideSteps(cid,total){S.revealed[cid]=0;for(let i=1;i<=total;i++)document.getElementById(`s${cid}-${i}`)?.classList.add('hidden');const b=document.getElementById(`ns-${cid}`);if(b)b.textContent='Siguiente ›';}
function showAll(cid,total){S.revealed[cid]=total;for(let i=1;i<=total;i++){const el=document.getElementById(`s${cid}-${i}`);if(el){el.classList.remove('hidden');renderMath(el);}}const b=document.getElementById(`ns-${cid}`);if(b)b.textContent='✓ Completo';}
function nextStep(cid,total){const cur=S.revealed[cid]||0;if(cur>=total){toast('Ya has visto todos los pasos');return;}S.revealed[cid]=cur+1;const el=document.getElementById(`s${cid}-${cur+1}`);if(el){el.classList.remove('hidden');renderMath(el);el.scrollIntoView({behavior:'smooth',block:'nearest'});}if(S.revealed[cid]>=total){const b=document.getElementById(`ns-${cid}`);if(b)b.textContent='✓ Completo';}}

/* FLASHCARDS */
function rFC(){
  if(!S.fcd.length)return empt('No hay flashcards para este tema.');
  const c=S.fcd[0];
  return `<div class="fc-wrap"><div class="fc-header"><button class="fc-nav" id="fc-prev" onclick="fcPrev()" disabled>◀</button><div class="fc-prog-bar"><div class="fc-prog-fill" id="fc-pf" style="width:${100/S.fcd.length}%"></div></div><span class="fc-prog-txt" id="fcc">1 / ${S.fcd.length}</span><button class="fc-nav" id="fc-next" onclick="fcNext()" ${S.fcd.length<=1?'disabled':''}>▶</button></div><div class="fc-scene" id="fc-scene" onclick="flipFC()"><div class="fc-inner" id="fc-in"><div class="fc-face fc-front"><div class="fc-con" id="fc-fr">${c?.front||''}<div class="fc-hint">Haz clic para ver la respuesta</div></div></div><div class="fc-face fc-back"><div class="fc-con" id="fc-bk">${c?.back||''}</div></div></div></div><div class="fc-ctrl"><button class="fc-flip-btn" onclick="flipFC()">⟳ Voltear</button></div><div class="fc-keys"><kbd>←</kbd><kbd>→</kbd> Navegar &nbsp;·&nbsp; <kbd>Espacio</kbd> Voltear</div></div>`;
}
function flipFC(){S.fcf=!S.fcf;document.getElementById('fc-in')?.classList.toggle('flipped',S.fcf);}
function fcNext(){if(S.fci>=S.fcd.length-1)return;S.fci++;S.fcf=false;updFC();}
function fcPrev(){if(S.fci<=0)return;S.fci--;S.fcf=false;updFC();}
function updFC(){
  const c=S.fcd[S.fci];const inn=document.getElementById('fc-in');if(!inn)return;
  inn.classList.remove('flipped');
  document.getElementById('fc-fr').innerHTML=`${c.front||''}<div class="fc-hint">Haz clic para ver la respuesta</div>`;
  document.getElementById('fc-bk').innerHTML=c.back||'';
  document.getElementById('fcc').textContent=`${S.fci+1} / ${S.fcd.length}`;
  document.getElementById('fc-pf').style.width=((S.fci+1)/S.fcd.length*100).toFixed(1)+'%';
  document.getElementById('fc-prev').disabled=S.fci===0;
  document.getElementById('fc-next').disabled=S.fci===S.fcd.length-1;
  const w=document.querySelector('.fc-wrap');if(w)renderMath(w);
}
document.addEventListener('keydown',e=>{
  if(S.tab!=='flashcards')return;
  if(e.key==='ArrowRight')fcNext();else if(e.key==='ArrowLeft')fcPrev();
  else if(e.key===' '||e.key==='Enter'){e.preventDefault();flipFC();}
});

/* QUIZ */
function rQQ(){
  if(S.qidx>=S.qi.length)return rQRes();
  const it=S.qi[S.qidx],pct=(S.qidx/S.qi.length*100).toFixed(0),L=['A','B','C','D'];
  return `<div class="qz-wrap"><div class="qz-top"><div class="qz-bar-wrap"><div class="qz-fill" style="width:${pct}%"></div></div><span class="qz-counter">${S.qidx+1} / ${S.qi.length}</span></div><div class="qz-q">${it.question_html||''}</div><div class="qz-opts">${(it.options||[]).map((o,i)=>`<button class="qz-opt" id="qo${i}" onclick="selAns(${i},${it.correct_index})"><span class="qz-lt">${L[i]}</span><span>${o}</span></button>`).join('')}</div><div id="qfb"></div></div>`;
}
function selAns(idx,cor){
  if(S.qans)return;S.qans=true;if(idx===cor)S.qsc++;
  document.querySelectorAll('.qz-opt').forEach((b,i)=>{b.disabled=true;if(i===cor)b.classList.add('correct');else if(i===idx&&idx!==cor)b.classList.add('wrong');});
  const it=S.qi[S.qidx],fb=document.getElementById('qfb');
  if(fb){fb.innerHTML=`<div class="qz-fb ${idx===cor?'correct':'wrong'}"><strong>${idx===cor?'✓ Correcto':'✗ Incorrecto'}</strong>${it.feedback_html?`<div style="margin-top:5px">${it.feedback_html}</div>`:''}</div><button class="btn-primary" onclick="nextQ()">${S.qidx<S.qi.length-1?'Siguiente →':'Ver resultado →'}</button>`;renderMath(fb);}
}
function nextQ(){S.qidx++;S.qans=false;const tc=document.getElementById('tc');if(tc){tc.innerHTML=rQQ();renderMath(tc);}}
function rQRes(){
  const pct=Math.round(S.qsc/S.qi.length*100);const cls=pct>=80?'ok':pct>=60?'mid':'low';
  const msg=pct>=80?'¡Excelente! Dominas este contenido.':pct>=60?'Buen progreso. Repasa los errores.':'Sigue practicando. Revisa la teoría antes de repetir.';
  return `<div class="qz-wrap"><div class="qz-res"><div class="qz-sc ${cls}">${S.qsc}/${S.qi.length}</div><div class="qz-scl">${pct}% de aciertos</div><div class="qz-msg">${msg}</div><div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap"><button class="btn-primary" onclick="resetQ()">↺ Repetir</button><button class="btn-sec" onclick="swTab('${S.tid}','teoria')">📖 Repasar teoría</button></div></div></div>`;
}
function resetQ(){S.qidx=0;S.qans=false;S.qsc=0;const tc=document.getElementById('tc');if(tc){tc.innerHTML=rQQ();renderMath(tc);}}

/* TAREAS */
function rTaskList(tasks){if(!tasks||!tasks.length)return empt('No hay tareas para este tema.');return tasks.map(t=>rTaskCard(t)).join('');}
function rTareas(){
  const all=[];S.topics.forEach(tp=>{const d=S.cache[tp.id];if(d?.tasks?.length)d.tasks.forEach(t=>all.push({...t,_topic:tp.title,_tid:tp.id}));});
  if(!all.length){show(`<div class="ph"><div class="pt">Tareas</div><div class="ps">Todas las tareas del curso</div></div><div class="empty"><div class="empty-ico">📋</div><div class="empty-t">No hay tareas cargadas</div><div class="empty-s">Las tareas aparecen aquí cuando se añaden a los JSON de cada tema.</div></div>`);return;}
  show(`<div class="ph"><div class="pt">Tareas</div><div class="ps">${all.length} tareas en total</div></div>${all.map(t=>`<div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t4);margin:14px 0 4px"><span style="cursor:pointer;color:var(--a-m)" onclick="nav('#/tema/${t._tid}')">${t._topic}</span></div>`+rTaskCard(t)).join('')}`);
}
function rTaskCard(t){
  const status=t.status||'pending';
  const ico={done:'✅',pending:'📌','due-soon':'🔴'}[status]||'📋';
  const smap={done:'bd-green',pending:'bd-gold','due-soon':'bd-red'};
  const slbl={done:'Entregada',pending:'Pendiente','due-soon':'Urgente'};
  return `<div class="task-card"><div class="task-header"><div class="task-ico ${status}">${ico}</div><div class="task-meta"><div class="task-title">${t.title||'Tarea'}</div><div class="task-info">${t.due_date?`<span>📅 ${t.due_date}</span>`:''} ${t.type?`<span>📂 ${t.type}</span>`:''} ${t.points?`<span>⭐ ${t.points} pts</span>`:''}</div></div><span class="badge ${smap[status]||'bd-gray'}">${slbl[status]||status}</span></div>${t.description_html?`<div class="task-desc">${t.description_html}</div>`:''}<div class="task-footer">${(t.keywords||[]).slice(0,3).map(k=>`<span class="kw">${k}</span>`).join('')}${(t.saberes_basicos||[]).slice(0,2).map(s=>`<span class="badge bd-blue">${s}</span>`).join('')}</div></div>`;
}

/* SEARCH */
function rSearch(q){
  show(`<div class="ph"><div class="pt">Buscador</div><div class="ps">Busca en toda la plataforma</div></div><div style="max-width:660px"><div style="position:relative;margin-bottom:16px"><span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:1rem">🔍</span><input class="sinput" id="sm-in" value="${q||''}" placeholder="Buscar conceptos, ejercicios, saberes…" oninput="liveSrch(this.value)" autofocus></div><div class="filter-row"><button class="filt ${S.srFilter==='all'?'active':''}" onclick="setSrFilter('all')">Todo</button><button class="filt ${S.srFilter==='teoria'?'active':''}" onclick="setSrFilter('teoria')">📖 Teoría</button><button class="filt ${S.srFilter==='ejemplo'?'active':''}" onclick="setSrFilter('ejemplo')">✏️ Ejemplos</button><button class="filt ${S.srFilter==='ejercicio'?'active':''}" onclick="setSrFilter('ejercicio')">🔧 Ejercicios</button></div><div id="sres">${srHtml((q||'').toLowerCase().trim())}</div></div>`);
}
function setSrFilter(f){S.srFilter=f;document.querySelectorAll('.filt').forEach((b,i)=>b.classList.toggle('active',['all','teoria','ejemplo','ejercicio'][i]===f));const v=document.getElementById('sm-in')?.value||'';const el=document.getElementById('sres');if(el)el.innerHTML=srHtml(v.toLowerCase().trim());}
function srHtml(ql){
  const TL={'teoria':'📖 Teoría','ejemplo':'✏️ Ejemplo','ejercicio':'🔧 Ejercicio'};
  const tabMap={'teoria':'teoria','ejemplo':'ejemplos','ejercicio':'ejercicios'};
  const hl=t=>ql?t.replace(new RegExp(`(${ql.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'),'<mark class="hl">$1</mark>'):t;
  const res=ql?S.idx.filter(it=>{if(S.srFilter!=='all'&&it.type!==S.srFilter)return false;return `${it.title} ${it.exc} ${(it.kw||[]).join(' ')}`.toLowerCase().includes(ql);}):[];
  if(!res.length&&ql)return `<div class="empty"><div class="empty-ico">🔍</div><div class="empty-t">Sin resultados para "${ql}"</div><div class="empty-s">Prueba con otras palabras clave</div></div>`;
  if(!ql)return `<div class="empty" style="padding:28px 0"><div class="empty-ico" style="font-size:2rem;opacity:.2">🔍</div><div class="empty-s">Empieza a escribir…</div></div>`;
  return `<div style="font-size:.8rem;color:var(--t3);margin-bottom:10px">${res.length} resultado${res.length!==1?'s':''}</div>`+res.map(r=>`<div class="sr" onclick="nav('#/tema/${r.tid}/${tabMap[r.type]||'teoria'}')"><div class="sr-tp">${TL[r.type]||r.type} · ${r.ttl}</div><div class="sr-tt">${hl(r.title)}</div>${r.exc?`<div class="sr-ex">${hl(r.exc.slice(0,120))}</div>`:''}</div>`).join('');
}
function liveSrch(v){const el=document.getElementById('sres');if(el)el.innerHTML=srHtml(v.toLowerCase().trim());}
function searchKw(kw){nav(`#/buscar?q=${encodeURIComponent(kw)}`);}
document.getElementById('sb-inp').addEventListener('input',function(e){const q=e.target.value.trim();if(q.length>1)nav(`#/buscar?q=${encodeURIComponent(q)}`);});
document.getElementById('sb-inp').addEventListener('keydown',function(e){if(e.key==='Enter')nav(`#/buscar?q=${encodeURIComponent(e.target.value.trim())}`);});

    theory_sections:[
      {id:'tf01',title:'Concepto de función',level:1,keywords:['función','variable dependiente','variable independiente'],saberes_basicos:['SB4'],content_html:`<div class="ib ib-def"><div class="ib-t">📌 Definición formal</div><p>Una <strong>función</strong> $f: A \\to B$ es una correspondencia que asigna a cada $x \\in A$ <strong>exactamente un</strong> valor $y = f(x) \\in B$.</p></div><p>La variable $x$ se denomina <strong>variable independiente</strong> y $y = f(x)$ es la <strong>variable dependiente</strong>. El conjunto $A$ es el <strong>dominio</strong> y $B$ el <strong>codominio</strong>.</p><p>La condición esencial es que cada $x$ tenga <em>una y sólo una imagen</em>. No obstante, distintos $x$ pueden tener la misma imagen.</p><div class="ib ib-note"><div class="ib-t">💡 Regla de la línea vertical</div><p>Una curva en el plano representa una función si y solo si ninguna recta vertical la corta en <strong>más de un punto</strong>.</p></div>`,common_mistakes:['Confundir expresión algebraica con función: $x^2+1$ no es una función hasta especificar dominio y codominio.','Creer que toda función tiene una fórmula. También puede definirse por tablas, gráficas o enumeración.','Olvidar que distintos $x$ pueden tener la misma imagen, pero cada $x$ solo tiene una imagen.']},
      {id:'tf02',title:'Dominio y recorrido',level:1,keywords:['dominio','recorrido','imagen','Dom(f)','Im(f)'],saberes_basicos:['SB4'],content_html:`<div class="ib ib-def"><div class="ib-t">📌 Dominio</div><p>El <strong>dominio</strong> de $f$ es el conjunto de $x$ para los que $f$ está definida: $$\\text{Dom}(f) = \\{x \\in \\mathbb{R} \\mid f(x) \\text{ existe}\\}$$</p></div><div class="ib ib-def"><div class="ib-t">📌 Recorrido o imagen</div><p>El <strong>recorrido</strong> es el conjunto de todos los valores que toma $f$: $$\\text{Im}(f) = \\{y \\in \\mathbb{R} \\mid \\exists\\, x \\in \\text{Dom}(f) : f(x)=y\\}$$</p></div><p>Para determinar el <strong>dominio natural</strong>, identificamos las restricciones:</p><ul><li><strong>Funciones racionales:</strong> excluir los ceros del denominador.</li><li><strong>Raíces de índice par:</strong> el radicando debe ser $\\geq 0$.</li><li><strong>Logaritmos:</strong> el argumento debe ser $> 0$.</li><li><strong>Varias restricciones:</strong> tomar la intersección.</li></ul>`,common_mistakes:['Confundir dominio (valores de $x$) con recorrido (valores de $y$).','Para $\\sqrt{f(x)}$, la condición es $f(x) \\geq 0$. El cero sí pertenece al dominio.','En funciones racionales, no encontrar TODOS los ceros del denominador.','Con varias restricciones, no tomar la intersección sino unirlas incorrectamente.']},
      {id:'tf03',title:'Monotonía, extremos y simetrías',level:2,keywords:['monotonía','creciente','decreciente','máximo','mínimo','función par','función impar'],saberes_basicos:['SB4'],content_html:`<div class="ib ib-def"><div class="ib-t">📌 Monotonía</div><p><strong>Creciente</strong> en $I$: $\\forall\\, x_1 < x_2$ en $I \\Rightarrow f(x_1) < f(x_2)$</p><p><strong>Decreciente</strong> en $I$: $\\forall\\, x_1 < x_2$ en $I \\Rightarrow f(x_1) > f(x_2)$</p></div><p>Los extremos relativos son los puntos donde la función cambia de monotonía:</p><ul><li><strong>Máximo relativo</strong> en $x_0$: $f(x_0) \\geq f(x)$ en un entorno de $x_0$.</li><li><strong>Mínimo relativo</strong> en $x_0$: $f(x_0) \\leq f(x)$ en un entorno de $x_0$.</li></ul><div class="ib ib-def"><div class="ib-t">📌 Simetrías</div><p><strong>Función par:</strong> $f(-x) = f(x)$ → simétrica respecto al eje $OY$.</p><p><strong>Función impar:</strong> $f(-x) = -f(x)$ → simétrica respecto al origen $O$.</p></div>`,common_mistakes:['Decir que $f$ es creciente «en el punto $x=a$». La monotonía siempre es en intervalos.','Confundir extremo relativo con absoluto.','Al comprobar par/impar, sustituir $-x$ solo en parte de la expresión.','Olvidar verificar que el dominio es simétrico antes de clasificar como par o impar.']}
    ],
    worked_examples:[
      {id:'ef01',title:'Dominio de una función racional',difficulty:'basica',keywords:['dominio','función racional'],saberes_basicos:['SB4'],problem_html:'<p>Calcula el dominio de $\\displaystyle f(x) = \\dfrac{x+1}{x^2-4}$.</p>',strategy_html:'Las funciones racionales no están definidas cuando el denominador es cero. Igualamos el denominador a cero y excluimos esas soluciones.',solution_steps:[{step:1,explanation_html:'<p>El denominador no puede ser cero:</p>',latex:'x^2 - 4 = 0'},{step:2,explanation_html:'<p>Factorizamos como diferencia de cuadrados:</p>',latex:'(x-2)(x+2) = 0'},{step:3,explanation_html:'<p>Las soluciones $x=2$ y $x=-2$ quedan excluidas:</p>',latex:'\\text{Dom}(f) = \\mathbb{R} \\setminus \\{-2,\\, 2\\} = (-\\infty,-2)\\cup(-2,2)\\cup(2,+\\infty)'}],common_mistake_html:'<p>Error: obtener solo una solución. Hay que resolver la ecuación completa y excluir <strong>todas</strong> las raíces.</p>',final_answer_html:'<p>$\\text{Dom}(f) = (-\\infty,-2)\\cup(-2,2)\\cup(2,+\\infty)$</p>'},
      {id:'ef02',title:'Dominio con raíz cuadrada',difficulty:'basica',keywords:['dominio','raíz cuadrada','inecuación'],saberes_basicos:['SB4'],problem_html:'<p>Calcula el dominio de $g(x) = \\sqrt{3x-6}$.</p>',strategy_html:'Para que la raíz exista, el radicando debe ser no negativo. Planteamos la inecuación $3x-6 \\geq 0$ y la resolvemos.',solution_steps:[{step:1,explanation_html:'<p>Condición para la raíz:</p>',latex:'3x - 6 \\geq 0'},{step:2,explanation_html:'<p>Sumamos 6:</p>',latex:'3x \\geq 6'},{step:3,explanation_html:'<p>Dividimos entre 3:</p>',latex:'x \\geq 2'}],common_mistake_html:'<p>Error: escribir $3x-6 > 0$. La raíz de 0 es 0, así que $x=2$ <strong>sí</strong> pertenece al dominio.</p>',final_answer_html:'<p>$\\text{Dom}(g) = [2, +\\infty)$</p>'},
      {id:'ef03',title:'¿La función es par, impar o ninguna?',difficulty:'media',keywords:['función par','función impar','simetría'],saberes_basicos:['SB4'],problem_html:'<p>Clasifica $f(x) = x^3 - 2x$ como par, impar o ninguna.</p>',strategy_html:'Calculamos $f(-x)$ y comparamos con $f(x)$ y $-f(x)$.',solution_steps:[{step:1,explanation_html:'<p>Sustituimos $x \\to -x$:</p>',latex:'f(-x) = (-x)^3 - 2(-x) = -x^3 + 2x'},{step:2,explanation_html:'<p>Calculamos $-f(x)$:</p>',latex:'-f(x) = -(x^3 - 2x) = -x^3 + 2x'},{step:3,explanation_html:'<p>Como $f(-x) = -f(x)$:</p>',latex:'f(-x) = -f(x) \\Rightarrow f \\text{ es impar}'}],final_answer_html:'<p>$f(x) = x^3-2x$ es <strong>impar</strong>. Simétrica respecto al origen.</p>'}
    ],
    solved_exercises:[
      {id:'sf01',title:'Dominio con raíz y denominador simultáneos',difficulty:'media',keywords:['dominio','raíz cuadrada','función racional'],saberes_basicos:['SB4'],problem_html:'<p>Calcula el dominio de $\\displaystyle f(x) = \\dfrac{\\sqrt{x-1}}{x-3}$.</p>',approach_html:'Hay dos restricciones simultáneas. El dominio es la <strong>intersección</strong> de ambas condiciones.',solution_steps:[{step:1,explanation_html:'<p><strong>Condición 1</strong> — radicando no negativo:</p>',latex:'x - 1 \\geq 0 \\Rightarrow x \\geq 1'},{step:2,explanation_html:'<p><strong>Condición 2</strong> — denominador no nulo:</p>',latex:'x - 3 \\neq 0 \\Rightarrow x \\neq 3'},{step:3,explanation_html:'<p>Intersección: $x \\geq 1$ y $x \\neq 3$:</p>',latex:'\\text{Dom}(f) = [1,3) \\cup (3,+\\infty)'}],check_html:'<p>$f(1) = \\frac{0}{-2} = 0$ ✓ · $f(4) = \\frac{\\sqrt{3}}{1}$ ✓ · $f(3)$ no existe ✓</p>',common_mistake_html:'<p>Error: no combinar las condiciones. Deben cumplirse <strong>simultáneamente</strong>.</p>',final_answer_html:'<p>$\\text{Dom}(f) = [1,3) \\cup (3,+\\infty)$</p>'},
      {id:'sf02',title:'Intervalos de monotonía dados los extremos',difficulty:'media',keywords:['monotonía','creciente','decreciente','extremos'],saberes_basicos:['SB4'],problem_html:'<p>$h(x)=x^3-3x$ tiene máximo en $x=-1$ ($h(-1)=2$) y mínimo en $x=1$ ($h(1)=-2$). Indica los intervalos de crecimiento y decrecimiento.</p>',approach_html:'Los extremos dividen $\\mathbb{R}$ en intervalos. Evaluamos un punto de prueba en cada uno.',solution_steps:[{step:1,explanation_html:'<p>Los extremos dividen $\\mathbb{R}$ en tres intervalos:</p>',latex:'(-\\infty,-1), \\quad (-1,1), \\quad (1,+\\infty)'},{step:2,explanation_html:'<p>En $(-\\infty,-1)$: $h(-3)<h(-2)$ → <strong>creciente</strong>.</p>',latex:'h(-3)=-18 < h(-2)=-2'},{step:3,explanation_html:'<p>En $(-1,1)$: baja de 2 a $-$2 → <strong>decreciente</strong>.</p>',latex:'h(-1)=2 > h(0)=0 > h(1)=-2'},{step:4,explanation_html:'<p>En $(1,+\\infty)$: $h(1)<h(2)$ → <strong>creciente</strong>.</p>',latex:'h(1)=-2 < h(2)=2'}],final_answer_html:'<p>$h$ es <strong>creciente</strong> en $(-\\infty,-1)$ y $(1,+\\infty)$, <strong>decreciente</strong> en $(-1,1)$.</p>'}
    ],
    flashcards:[
      {id:'fc01',front:'¿Qué es una función $f: A \\to B$?',back:'Una correspondencia que asigna a cada $x \\in A$ <strong>exactamente un</strong> $f(x) \\in B$. Cada elemento del dominio tiene una única imagen.'},
      {id:'fc02',front:'¿Qué es el dominio $\\text{Dom}(f)$?',back:'El conjunto de todos los $x$ para los que la función está definida y produce un resultado real.'},
      {id:'fc03',front:'¿Qué es el recorrido $\\text{Im}(f)$?',back:'El conjunto de todos los valores que toma $f(x)$.'},
      {id:'fc04',front:'¿Por qué se excluyen valores en funciones racionales?',back:'Porque el denominador <strong>no puede ser cero</strong>. Resolvemos denominador$=0$ y excluimos esas soluciones.'},
      {id:'fc05',front:'Condición del dominio para $\\sqrt{f(x)}$',back:'El radicando debe ser $f(x) \\geq 0$. El cero está permitido: $\\sqrt{0}=0$.'},
      {id:'fc06',front:'¿Qué es una función par?',back:'$f(-x) = f(x)$ para todo $x$. Su gráfica es simétrica respecto al eje $Y$.'},
      {id:'fc07',front:'¿Qué es una función impar?',back:'$f(-x) = -f(x)$ para todo $x$. Su gráfica es simétrica respecto al origen.'},
      {id:'fc08',front:'¿Cuándo es creciente $f$ en un intervalo $I$?',back:'Cuando $x_1 < x_2 \\Rightarrow f(x_1) < f(x_2)$. Al avanzar hacia la derecha, los valores suben.'},
      {id:'fc09',front:'Regla de la línea vertical',back:'Una gráfica es función si ninguna recta vertical la corta en más de un punto.'},
      {id:'fc10',front:'Diferencia entre máximo relativo y absoluto',back:'Relativo: mayor en un entorno. Absoluto: mayor en todo el dominio. Puede haber varios relativos pero a lo sumo uno absoluto.'}
    ],
    quiz:[
      {id:'q01',question_html:'¿Cuál valor hace que $f(x)=\\dfrac{1}{x-5}$ no esté definida?',options:['$x=0$','$x=1$','$x=5$','$x=-5$'],correct_index:2,feedback_html:'El denominador $x-5=0$ cuando $x=5$, quedando excluido del dominio.'},
      {id:'q02',question_html:'El dominio de $g(x)=\\sqrt{2x-4}$ es:',options:['$x>2$','$x\\geq 2$','$x\\geq -2$','$x\\in\\mathbb{R}$'],correct_index:1,feedback_html:'$2x-4\\geq0 \\Rightarrow x\\geq2$. El valor $x=2$ pertenece al dominio porque $\\sqrt{0}=0$.'},
      {id:'q03',question_html:'Si $f(-x)=-f(x)$, la función es:',options:['Par','Impar','Ni par ni impar','Periódica'],correct_index:1,feedback_html:'La condición $f(-x)=-f(x)$ es exactamente la definición de función <strong>impar</strong>.'},
      {id:'q04',question_html:'$f$ es creciente en $I$ cuando, para $x_1<x_2$ en $I$:',options:['$f(x_1)>f(x_2)$','$f(x_1)<f(x_2)$','$f(x_1)=f(x_2)$','$f\'(x)>0$'],correct_index:1,feedback_html:'Creciente: $x_1<x_2 \\Rightarrow f(x_1)<f(x_2)$. Los valores suben al avanzar hacia la derecha.'},
      {id:'q05',question_html:'¿Cuál es el dominio de $h(x)=\\dfrac{\\sqrt{x}}{x-4}$?',options:['$[0,+\\infty)$','$[0,4)\\cup(4,+\\infty)$','$(0,4)$','$\\mathbb{R}\\setminus\\{4\\}$'],correct_index:1,feedback_html:'$x\\geq0$ (raíz) y $x\\neq4$ (denominador). Intersección: $[0,4)\\cup(4,+\\infty)$.'}
    ],
    tasks:[
      {id:'t01',title:'Análisis completo de una función racional',status:'pending',due_date:'15/06/2025',type:'Entrega escrita',points:10,keywords:['dominio','recorrido','monotonía'],saberes_basicos:['SB4'],description_html:'<p>Para la función $f(x)=\\dfrac{x^2-1}{x^2-4}$, determina:</p><ol><li>Dominio y puntos de discontinuidad.</li><li>Intersecciones con los ejes.</li><li>Asíntotas verticales y horizontales.</li><li>Monotonía e intervalos.</li><li>Representación gráfica esquemática.</li></ol>'}

  }
